name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.160.0
        with:
          ruby-version: '3.3' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Build with Jekyll
        run: bundle exec jekyll build

  # Code linting and testing
  code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
      - name: Lint Python code
        run: flake8 codes/**/*.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - name: Test Python code
        run: pytest codes/**/test_*.py -v || true

  # Documentation validation
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.160.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Validate Markdown files
        run: |
          gem install mdl -v 0.12.0
          mdl docs/ --style all || true
      - name: Check documentation links
        run: |
          gem install html-proofer -v 4.4.7
          bundle exec jekyll build
          htmlproofer _site --only-4xx --check-favicon --check-html || true
