title: 数字信号处理教材
description: 基于 GitHub 的系统化 DSP 学习资源平台
baseurl: "/test2" 
theme: just-the-docs

url: https://chen479.github.io/test2

aux_links:
  Template Repository: https://github.com/chen479/test2

# 左侧导航配置（通常默认即可）
just_the_docs:
  # 是否显示最后修改时间
  last_edit_timestamp: true
  last_edit_time_format: "%b %e %Y at %I:%M %p"

# 搜索配置
search_enabled: true
search:
  heading_level: 3
  previews: 5
  tokenizer: whitespace
  rel_url: false

# 辅助链接（可选）
aux_links:
  "GitHub 仓库":
    - "//github.com/chen479/test2"

# 如果需要支持代码高亮（默认已支持）
highlighter: rouge